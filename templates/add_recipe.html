{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>➕ Новый рецепт</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Название *</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Категория</label>
                        <select name="category" class="form-control">
                            <option>Основное блюдо</option>
                            <option>Закуска</option>
                            <option>Суп</option>
                            <option>Салат</option>
                            <option>Десерт</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Время (минуты)</label>
                        <input type="number" name="prep_time" class="form-control" value="30">
                    </div>
                    <div class="mb-3">
                        <label>Описание *</label>
                        <textarea name="description" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Ингредиенты *</label>
                        <textarea name="ingredients" class="form-control" rows="5" required placeholder="• Ингредиент 1&#10;• Ингредиент 2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Инструкция *</label>
                        <textarea name="instructions" class="form-control" rows="8" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
