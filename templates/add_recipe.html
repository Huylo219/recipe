{% extends "base.html" %}

{% block title %}Добавить рецепт{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card animate-fade-in">
            <div class="card-body p-4">
                <h2 class="mb-4" style="font-family: 'Playfair Display', serif;">
                    <i class="fas fa-plus-circle" style="color: #d4856b;"></i> Новый рецепт
                </h2>
                
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label class="form-label">Название блюда *</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Категория</label>
                        <select name="category" class="form-select">
                            <option>Основное блюдо</option>
                            <option>Закуска</option>
                            <option>Суп</option>
                            <option>Салат</option>
                            <option>Десерт</option>
                            <option>Напиток</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Время приготовления (минуты)</label>
                        <input type="number" name="prep_time" class="form-control" value="30">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Краткое описание *</label>
                        <textarea name="description" class="form-control" rows="3" required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Ингредиенты *</label>
                        <textarea name="ingredients" class="form-control" rows="6" required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Инструкция приготовления *</label>
                        <textarea name="instructions" class="form-control" rows="10" required></textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Сохранить рецепт
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
